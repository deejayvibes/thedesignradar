<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Design Radar</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0c10;
      --surface: #13151c;
      --border: #1e2130;
      --accent: #7fffb2;
      --accent2: #4fc3f7;
      --accent3: #ff6b9d;
      --text: #e8eaf2;
      --muted: #555b7a;
      --font-display: 'Syne', sans-serif;
      --font-title: 'Cormorant Garamond', serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 1;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .title {
      font-family: var(--font-title);
      font-weight: 300;
      font-size: 1rem;
      letter-spacing: 0.12em;
      color: var(--text);
      text-transform: uppercase;
    }

    .title em {
      font-style: normal;
      color: var(--text);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .notif-bell {
      position: relative;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }

    .notif-bell:hover {
      color: var(--text);
      background: var(--border);
    }

    .notif-dot {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ff6b9d;
      border: 1.5px solid var(--bg);
      box-shadow: 0 0 6px rgba(255, 107, 157, 0.8);
      animation: notif-pulse 2s ease-in-out infinite;
    }

    @keyframes notif-pulse {
      0%, 100% { transform: scale(1);   opacity: 1; }
      50%       { transform: scale(1.3); opacity: 0.7; }
    }

    .btn-download-sm {
      padding: 0.35rem 0.85rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }
    .btn-download-sm:hover { border-color: var(--accent); color: var(--accent); }

    /* ── NOTIFICATION DRAWER ── */
    .notif-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
    }
    .notif-overlay.open { pointer-events: all; }

    .notif-drawer {
      position: fixed;
      top: 0; right: 0;
      width: 360px;
      height: 100vh;
      background: #0f1117;
      border-left: 1px solid var(--border);
      z-index: 101;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: -12px 0 40px rgba(0,0,0,0.5);
    }
    .notif-drawer.open { transform: translateX(0); }

    .notif-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      z-index: 100;
      transition: background 0.32s;
      pointer-events: none;
    }
    .notif-backdrop.open {
      background: rgba(0,0,0,0.45);
      pointer-events: all;
    }

    .notif-header {
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .notif-header-title {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .notif-close {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      padding: 0;
      transition: color 0.2s;
    }
    .notif-close:hover { color: var(--text); }

    .notif-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0.5rem 0;
      overflow-y: auto;
    }

    .accordion-item {
      border-bottom: 1px solid var(--border);
    }

    .accordion-trigger {
      width: 100%;
      background: none;
      border: none;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      gap: 1rem;
      transition: background 0.15s;
    }
    .accordion-trigger:hover { background: rgba(255,255,255,0.03); }

    .accordion-heading {
      font-family: var(--font-display);
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-align: left;
      letter-spacing: 0.01em;
    }

    .accordion-chevron {
      color: var(--muted);
      flex-shrink: 0;
      transition: transform 0.25s ease;
    }
    .accordion-item.open .accordion-chevron { transform: rotate(180deg); }

    .accordion-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s ease;
    }
    .accordion-item.open .accordion-body {
      max-height: 400px;
    }

    .accordion-content {
      padding: 0.25rem 1.5rem 1.25rem;
    }

    .accordion-text {
      font-family: var(--font-display);
      font-size: 0.78rem;
      color: #b0b8d0;
      line-height: 1.7;
      margin: 0;
    }

    .accordion-bullet {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.3rem 0;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: #b0b8d0;
      letter-spacing: 0.04em;
    }

    .accordion-bullet-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    /* ── LAYOUT ── */
    main {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 2fr;
      min-height: 0;
    }

    /* ── LEFT PANEL ── */
    .panel {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1.25rem 1.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0;
      position: relative;
    }

    .panel-title {
      font-size: 0.6rem;
      font-family: var(--font-mono);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    /* ── MEMBER TABS ── */
    .member-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.75rem;
    }

    .member-tab {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.6rem 0.3rem 0.5rem;
      border-radius: 100px;
      border: 1.5px solid transparent;
      background: var(--bg);
      cursor: pointer;
      transition: all 0.18s;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      font-family: var(--font-display);
    }
    .member-tab:hover { color: var(--text); border-color: var(--border); }
    .member-tab.active { color: var(--text); background: var(--surface); }

    .member-tab .tab-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    .member-tab .tab-name {
      outline: none; border: none; background: transparent;
      color: inherit; font: inherit; width: 62px; cursor: pointer;
    }
    .member-tab.active .tab-name { cursor: text; }

    .member-tab .tab-remove {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 0.75rem; line-height: 1;
      padding: 0; opacity: 0; transition: opacity 0.15s;
    }
    .member-tab:hover .tab-remove,
    .member-tab.active .tab-remove { opacity: 1; }

    .add-member-btn {
      padding: 0.3rem 0.55rem;
      border-radius: 100px;
      border: 1.5px dashed var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.18s;
      line-height: 1;
    }
    .add-member-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── METRIC ROWS ── */
    .metric-row {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      padding: 0.5rem 0;
      animation: slideIn 0.4s ease both;
    }

    .metric-row:first-child {
      margin-top: 1.5rem;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .metric-header { display: flex; justify-content: space-between; align-items: center; }
    .metric-label  { display: flex; align-items: center; gap: 0.4rem; font-size: 0.78rem; font-weight: 600; }
    .dot           { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .metric-value  { font-family: var(--font-mono); font-size: 0.72rem; min-width: 20px; text-align: right; }

    /* ── SLIDER ── */
    input[type="range"] {
      width: 100%; -webkit-appearance: none; appearance: none;
      height: 2px; border-radius: 0; background: var(--border);
      outline: none; cursor: pointer; display: block; margin: 6px 0 0 0;
    }
    input[type="range"]::-webkit-slider-runnable-track { height: 2px; background: var(--border); }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--thumb-color, var(--accent));
      box-shadow: 0 0 2px var(--thumb-color, var(--accent));
      transition: background 0.15s, box-shadow 0.15s;
      margin-top: -8px; cursor: grab;
    }
    input[type="range"]:active::-webkit-slider-thumb  { cursor: grabbing; background: #fff; box-shadow: 0 0 4px rgba(255,255,255,0.4); }
    input[type="range"]::-webkit-slider-thumb:hover   { background: #fff; box-shadow: 0 0 4px rgba(255,255,255,0.4); }
    input[type="range"]::-moz-range-track { height: 2px; background: var(--border); border: none; }
    input[type="range"]::-moz-range-thumb {
      width: 18px; height: 18px; border-radius: 50%; border: none;
      background: var(--thumb-color, var(--accent));
      box-shadow: 0 0 2px var(--thumb-color, var(--accent)); cursor: grab;
    }

    .panel-footer {
      margin-top: auto;
      padding-top: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-footer-link {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .panel-footer-link:hover { color: var(--text); }

    /* ── TOAST ── */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      15%      { transform: translateX(-8px); }
      30%      { transform: translateX(8px); }
      45%      { transform: translateX(-6px); }
      60%      { transform: translateX(6px); }
      75%      { transform: translateX(-3px); }
      90%      { transform: translateX(3px); }
    }
    .toast {
      margin-bottom: 1rem;
      background: #1e2130; border: 1px solid #ff6b9d; color: #ff6b9d;
      font-family: var(--font-mono); font-size: 0.7rem;
      padding: 0.5rem 1rem; border-radius: 8px; letter-spacing: 0.06em;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
      text-align: center; flex-shrink: 0;
    }
    .toast.show { opacity: 1; animation: shake 0.5s ease; }

    /* ── RIGHT PANEL ── */
    .chart-area {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem 3rem; gap: 1.25rem; position: relative;
      overflow: hidden;
    }

    .chart-container { position: relative; width: min(520px, 100%); aspect-ratio: 1; }

    .chart-glow {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(127,255,178,0.06) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
    }

    canvas#spiderChart { width: 100% !important; height: 100% !important; }

    /* ── LEGEND ── */
    .chart-legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.5rem 1.25rem; }
    .legend-item  { display: flex; align-items: center; gap: 0.4rem; font-family: var(--font-display); font-size: 0.75rem; font-weight: 600; }
    .legend-swatch { width: 20px; height: 3px; border-radius: 2px; flex-shrink: 0; }

    /* ── SPACE LABELS ── */
    .space-label {
      position: absolute;
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.12);
      pointer-events: none;
      z-index: 1;
    }
    .top-left    { top: 1.25rem; left: 1.5rem; }
    .top-right   { top: 1.25rem; right: 1.5rem; }
    .bottom-centre {
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
    }

    footer { display: none; }

    @media (max-width: 800px) {
      main { grid-template-columns: 1fr; }
      .panel { border-right: none; border-bottom: 1px solid var(--border); }
      header { padding: 1rem 1.25rem; }
    }
  </style>
</head>
<body>

<header>
  <span class="title">The <em>Team Radar</em></span>
  <div class="header-actions">
    <div class="notif-bell" title="Notifications" onclick="openDrawer()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="7" x2="21" y2="7"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="17" x2="21" y2="17"/>
      </svg>
    </div>
  </div>
</header>

<main>
  <aside class="panel" id="mainPanel">
    <div class="member-tabs" id="memberTabs"></div>
    <div class="toast" id="toast"></div>
    <div id="metricsPanel"></div>
    <div class="panel-footer">
      <button class="btn-download-sm" onclick="downloadChart()">⬇ Download Graph</button>
      <a href="https://medium.com/awful-awkward-awesome-the-in-betweens/a-framework-to-put-together-a-mighty-design-team-for-product-and-service-based-organisations-df2cbcf5ff0c" target="_blank" rel="noopener" style="text-decoration:none;display:inline-flex;align-items:center;font-family:var(--font-mono);font-size:0.65rem;color:var(--muted);letter-spacing:0.05em;transition:color 0.2s" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">How It Works</a>
    </div>
  </aside>

  <section class="chart-area">
    <svg id="axisExtLines" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:0"></svg>
    <span class="space-label top-left">Solution Space</span>
    <span class="space-label top-right">Problem Space</span>
    <div class="chart-container">
      <div class="chart-glow"></div>
      <canvas id="spiderChart"></canvas>
    </div>
    <div class="chart-legend" id="chartLegend"></div>
    <span class="space-label bottom-centre">Execution Space</span>
  </section>
</main>

<footer></footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
  const MEMBER_COLOURS = [
    { border: '#7fffb2', bg: 'rgba(127,255,178,0.10)' },
    { border: '#4fc3f7', bg: 'rgba(79,195,247,0.10)'  },
    { border: '#ff6b9d', bg: 'rgba(255,107,157,0.10)' },
    { border: '#ffd166', bg: 'rgba(255,209,102,0.10)' },
    { border: '#a78bfa', bg: 'rgba(167,139,250,0.10)' },
    { border: '#fb923c', bg: 'rgba(251,146,60,0.10)'  },
  ];

  const AXIS_DOTS  = ['#7fffb2','#4fc3f7','#ff6b9d','#ffd166','#a78bfa','#fb923c','#34d399'];
  const axisLabels = ['Hunter','Q1','Q4','Farmer','Q3','Q2'];
  const panelOrder = [0, 3, 1, 5, 4, 2]; // Hunter, Farmer, Q1, Q2, Q3, Q4

  let members      = [{ name: 'Member 1', values: [6, 6, 6, 6, 6, 6] }];
  let activeMember = 0;

  // ── Chart ──
  const ctx = document.getElementById('spiderChart').getContext('2d');
  const spiderChart = new Chart(ctx, {
    type: 'radar',
    data: { labels: axisLabels, datasets: [] },
    options: {
      responsive: true, maintainAspectRatio: true,
      animation: { duration: 250, easing: 'easeInOutQuart' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#13151c', borderColor: '#1e2130', borderWidth: 1,
          titleFont: { family: 'DM Mono', size: 11 },
          bodyFont:  { family: 'Syne', size: 13, weight: '700' },
          padding: 12,
          callbacks: {
            title: items => members[items[0].datasetIndex]?.name || '',
            label: item  => `  ${axisLabels[item.dataIndex]}: ${item.raw} / 12`
          }
        }
      },
      scales: {
        r: {
          min: 0, max: 12,
          ticks: { stepSize: 2, color: '#2e3450', backdropColor: 'transparent', font: { family: 'DM Mono', size: 9 }, showLabelBackdrop: false },
          grid:        { color: '#1e2130', lineWidth: 1 },
          angleLines:  { color: '#1a1d2b', lineWidth: 1 },
          pointLabels: { color: '#8890b0', font: { family: 'Syne', size: 12, weight: '600' } }
        }
      }
    }
  });

  function updateChart(animate = true) {
    spiderChart.data.datasets = members.map((mem, i) => {
      const c = MEMBER_COLOURS[i % MEMBER_COLOURS.length];
      return {
        label: mem.name, data: mem.values,
        backgroundColor: c.bg, borderColor: c.border, borderWidth: 1.5,
        pointBackgroundColor: c.border, pointBorderColor: '#0b0c10',
        pointBorderWidth: 2, pointRadius: 4, pointHoverRadius: 8,
      };
    });
    spiderChart.options.animation = animate ? { duration: 250, easing: 'easeInOutQuart' } : false;
    spiderChart.update(animate ? undefined : 'none');
    drawExtensionLines();
  }

  // ── Extension lines from max points of Hunter(0), Q4(2), Q3(4) to browser edge ──
  function drawExtensionLines() {
    const svg    = document.getElementById('axisExtLines');
    const canvas = document.getElementById('spiderChart');
    const section = canvas.closest('.chart-area');
    if (!spiderChart.chartArea) return;

    const scale  = spiderChart.scales.r;
    const total  = axisLabels.length;
    const maxR   = scale.drawingArea;
    const cxChart = scale.xCenter;
    const cyChart = scale.yCenter;

    // Canvas position relative to the section
    const canvasRect  = canvas.getBoundingClientRect();
    const sectionRect = section.getBoundingClientRect();
    const dpr         = window.devicePixelRatio || 1;

    // canvas internal coords → section pixel coords
    const scaleX = canvasRect.width  / (canvas.width  / dpr);
    const scaleY = canvasRect.height / (canvas.height / dpr);
    const offX   = canvasRect.left - sectionRect.left;
    const offY   = canvasRect.top  - sectionRect.top;

    function toSection(cx, cy) {
      return {
        x: offX + cx * scaleX,
        y: offY + cy * scaleY
      };
    }

    // Axes to extend: Hunter=0, Q4=2, Q3=4
    const extAxes = [0, 2, 4];

    svg.innerHTML = '';

    extAxes.forEach(axisIdx => {
      const angle  = (2 * Math.PI * axisIdx / total) - Math.PI / 2;
      const dx     = Math.cos(angle);
      const dy     = Math.sin(angle);

      // Max point (value=12) in canvas coords
      const maxPt  = toSection(cxChart + dx * maxR, cyChart + dy * maxR);

      // Extend far enough to always exit the SVG viewport
      const farDist = Math.max(sectionRect.width, sectionRect.height) * 3;
      const endX   = maxPt.x + dx * farDist;
      const endY   = maxPt.y + dy * farDist;

      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', maxPt.x);
      line.setAttribute('y1', maxPt.y);
      line.setAttribute('x2', endX);
      line.setAttribute('y2', endY);
      line.setAttribute('stroke', 'rgba(255,255,255,0.18)');
      line.setAttribute('stroke-width', '1');
      line.setAttribute('stroke-dasharray', '3 7');
      line.setAttribute('stroke-linecap', 'round');
      svg.appendChild(line);
    });
  }

  window.addEventListener('resize', drawExtensionLines);

  // ── Tabs ──
  function renderTabs() {
    const tabsEl = document.getElementById('memberTabs');
    tabsEl.innerHTML = '';
    members.forEach((mem, i) => {
      const c = MEMBER_COLOURS[i % MEMBER_COLOURS.length];
      const tab = document.createElement('div');
      tab.className = 'member-tab' + (i === activeMember ? ' active' : '');
      tab.style.borderColor = i === activeMember ? c.border : 'transparent';
      tab.innerHTML = `
        <span class="tab-dot" style="background:${c.border}"></span>
        <input class="tab-name" value="${mem.name}" readonly
          onclick="if(${i}===activeMember){this.removeAttribute('readonly');this.select()}else{selectMember(${i})}"
          onblur="members[${i}].name=this.value;this.setAttribute('readonly','');renderTabs();updateChart();renderLegend()"
          onkeydown="if(event.key==='Enter'){this.blur()}"
          title="Click to rename"
        />
        ${members.length > 1 ? `<button class="tab-remove" onclick="removeMember(${i},event)">×</button>` : ''}
      `;
      tabsEl.appendChild(tab);
    });
    const addBtn = document.createElement('button');
    addBtn.className = 'add-member-btn';
    addBtn.textContent = '+';
    addBtn.title = 'Add team member';
    addBtn.onclick = addMember;
    tabsEl.appendChild(addBtn);
  }

  // ── Sliders ──
  function renderPanel() {
    const panel = document.getElementById('metricsPanel');
    const mem   = members[activeMember];
    const c     = MEMBER_COLOURS[activeMember % MEMBER_COLOURS.length];
    panel.innerHTML = '';

    // panelOrder: Hunter(0), Farmer(3), Q1(1), Q2(5), Q3(4), Q4(2)
    // Insert '// Mindsets' before Hunter (index 0 in panelOrder)
    // Insert '// Core Competencies' before Q1 (index 2 in panelOrder)
    const sectionBreaks = { 0: '// Mindsets', 2: '// Core Competencies' };

    panelOrder.forEach((ai, pi) => {
      // Inject section title if needed
      if (sectionBreaks[pi] !== undefined) {
        const title = document.createElement('div');
        title.className = 'panel-title';
        title.style.color = c.border;
        title.style.marginTop = pi === 0 ? '0' : '1rem';
        title.textContent = sectionBreaks[pi];
        panel.appendChild(title);
      }

      const label = axisLabels[ai];
      const val   = mem.values[ai];
      const row   = document.createElement('div');
      row.className = 'metric-row';
      row.style.animationDelay = `${pi * 0.04}s`;
      row.innerHTML = `
        <div class="metric-header">
          <div class="metric-label">
            <span class="dot" style="background:${AXIS_DOTS[ai % AXIS_DOTS.length]}"></span>
            <span style="font-size:0.78rem;font-weight:600">${label}</span>
          </div>
        </div>
        <div style="position:relative;width:100%;margin-top:6px">
          <input type="range" min="0" max="12" step="1" value="${val}"
            id="range-${ai}"
            data-ai="${ai}" style="accent-color:${c.border};--thumb-color:${c.border};width:100%;margin:0"
            oninput="members[${activeMember}].values[${ai}]=+this.value;updateThumbLabel(${ai},+this.value);updateChart(false)"/>
          <span id="val-${ai}" style="
            position:absolute;
            top:-18px;
            left:calc(${(val/12)*100}% + ${9 - (val/12)*18}px);
            transform:translateX(-50%);
            font-family:'DM Mono',monospace;
            font-size:0.5rem;
            font-weight:500;
            color:${c.border};
            pointer-events:none;
            transition:left 0.05s linear;
            white-space:nowrap;
          ">${val}</span>
        </div>
        <div style="position:relative;width:100%;height:13px;margin-top:1px">
          ${[0,2,4,6,8,10,12].map(n => {
            const pct = (n/12)*100;
            const off = `calc(${pct}% + ${8 - pct*0.16}px)`;
            return `<span id="tick-${ai}-${n}" style="position:absolute;left:${off};transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:0.5rem;color:#555b7a;pointer-events:none;${val===n?'opacity:0':''}">${n}</span>`;
          }).join('')}
        </div>
      `;
      panel.appendChild(row);
    });
  }

  function updateThumbLabel(ai, val) {
    const label = document.getElementById(`val-${ai}`);
    if (!label) return;
    const pct = val / 12;
    const offset = 9 - pct * 18;
    label.style.left = `calc(${pct * 100}% + ${offset}px)`;
    label.textContent = val;
    // Show/hide scale ticks — hide only the one matching current value
    [0,2,4,6,8,10,12].forEach(n => {
      const tick = document.getElementById(`tick-${ai}-${n}`);
      if (tick) tick.style.opacity = (n === val) ? '0' : '1';
    });
  }

  // ── Legend ──
  function renderLegend() {
    document.getElementById('chartLegend').innerHTML = members.map((mem, i) => {
      const c = MEMBER_COLOURS[i % MEMBER_COLOURS.length];
      return `<div class="legend-item">
        <span class="legend-swatch" style="background:${c.border}"></span>
        <span style="color:${c.border}">${mem.name}</span>
      </div>`;
    }).join('');
  }

  function selectMember(i) {
    activeMember = i;
    renderTabs(); renderPanel(); updateChart(); renderLegend();
  }

  // ── Toast ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.remove('show');
    void t.offsetWidth;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  function addMember() {
    if (members.length >= 6) { showToast('Maximum limit reached'); return; }
    members.push({ name: `Member ${members.length + 1}`, values: [6,6,6,6,6,6] });
    selectMember(members.length - 1);
  }

  function removeMember(i, e) {
    e.stopPropagation();
    if (members.length <= 1) return;
    members.splice(i, 1);
    activeMember = Math.min(activeMember, members.length - 1);
    renderTabs(); renderPanel(); updateChart(); renderLegend();
  }

  // ── Drag on chart ──
  (function setupChartDrag() {
    const canvas = document.getElementById('spiderChart');
    let draggingIdx = null;
    function center() {
      const a = spiderChart.chartArea;
      return { x:(a.left+a.right)/2, y:(a.top+a.bottom)/2, r:Math.min(a.right-a.left,a.bottom-a.top)/2 };
    }
    function angle(i,total){ return (2*Math.PI*i/total)-Math.PI/2; }
    function getPos(e){
      const rect=canvas.getBoundingClientRect(), src=e.touches?e.touches[0]:e;
      return { x:(src.clientX-rect.left)*(canvas.width/rect.width), y:(src.clientY-rect.top)*(canvas.height/rect.height) };
    }
    function findPoint(px,py){
      const {x:cx,y:cy,r:cr}=center(), n=axisLabels.length;
      let best=-1, bestD=35;
      members[activeMember].values.forEach((v,i)=>{
        const a=angle(i,n), ratio=v/12;
        const d=Math.hypot(px-(cx+Math.cos(a)*cr*ratio), py-(cy+Math.sin(a)*cr*ratio));
        if(d<bestD){bestD=d;best=i;}
      });
      return best;
    }
    function onDown(e){ const {x,y}=getPos(e); draggingIdx=findPoint(x,y); if(draggingIdx!==-1)e.preventDefault(); }
    function onMove(e){
      if(draggingIdx===null||draggingIdx===-1)return; e.preventDefault();
      const {x:px,y:py}=getPos(e),{x:cx,y:cy,r:cr}=center(),n=axisLabels.length;
      const a=angle(draggingIdx,n),dx=Math.cos(a),dy=Math.sin(a);
      const val=Math.round(Math.max(0,Math.min(12,((px-cx)*dx+(py-cy)*dy)/cr*12)));
      members[activeMember].values[draggingIdx]=val;
      const sl=document.querySelector(`input[data-ai="${draggingIdx}"]`);
      const vl=document.getElementById(`val-${draggingIdx}`);
      if(sl)sl.value=val; if(vl)vl.textContent=val; updateThumbLabel(draggingIdx,val);
      updateChart(false);
    }
    function onUp(){ draggingIdx=null; }
    canvas.addEventListener('mousedown',onDown);
    canvas.addEventListener('mousemove',onMove);
    canvas.addEventListener('mouseup',onUp);
    canvas.addEventListener('touchstart',onDown,{passive:false});
    canvas.addEventListener('touchmove',onMove,{passive:false});
    canvas.addEventListener('touchend',onUp);
  })();

  // ── Download PNG ──
  function downloadChart() {
    const PAD=48, chartCanvas=document.getElementById('spiderChart'), dpr=window.devicePixelRatio||1;
    const legendItems=members.map((mem,i)=>({name:mem.name,color:MEMBER_COLOURS[i%MEMBER_COLOURS.length].border}));
    const swatchW=20,swatchH=3,gap=8,itemGap=24,fontSize=13;
    const tmp=document.createElement('canvas').getContext('2d');
    tmp.font=`600 ${fontSize}px Syne, sans-serif`;
    const itemWidths=legendItems.map(it=>swatchW+gap+tmp.measureText(it.name).width);
    const totalLegendW=itemWidths.reduce((a,b)=>a+b,0)+(legendItems.length-1)*itemGap;
    const chartW=chartCanvas.width/dpr, chartH=chartCanvas.height/dpr;
    const totalW=chartW+PAD*2, totalH=chartH+PAD*2+24+16;
    const off=document.createElement('canvas');
    off.width=totalW*dpr; off.height=totalH*dpr;
    const octx=off.getContext('2d');
    octx.scale(dpr,dpr);
    octx.fillStyle='#0b0c10'; octx.fillRect(0,0,totalW,totalH);
    octx.drawImage(chartCanvas,PAD,PAD,chartW,chartH);
    const legendY=PAD+chartH+16; let legendX=(totalW-totalLegendW)/2;
    legendItems.forEach((it,i)=>{
      octx.fillStyle=it.color;
      octx.beginPath(); octx.roundRect(legendX,legendY+(fontSize-swatchH)/2,swatchW,swatchH,2); octx.fill();
      octx.font=`600 ${fontSize}px Syne, sans-serif`; octx.textBaseline='middle';
      octx.fillText(it.name,legendX+swatchW+gap,legendY+fontSize/2);
      legendX+=itemWidths[i]+itemGap;
    });
    const link=document.createElement('a');
    link.download='team-competence-chart.png'; link.href=off.toDataURL('image/png');
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
  }

  // ── Init ──
  renderTabs(); renderPanel(); updateChart(); renderLegend();
  setTimeout(drawExtensionLines, 300);

  // ── Notification Drawer ──
  const notifications = [
    {
      heading: 'There is no perfect hexagon',
      body: 'Stop hunting for "perfect hexagon" in one person. The idea is to identify your teammate\'s peak quality. Build a team where strengths offset gaps.'
    },
    {
      heading: 'Score by Seniority',
      bullets: ['Level 1 — Up to 4', 'Level 2 — Up to 8', 'Level 3 — Up to 12']
    },
    {
      heading: 'Name your teammate',
      body: 'Double-click any "Member" tag to rename it.'
    },
    {
      heading: 'Is it relevant in the AI Era?',
      body: 'As we surpass general intelligence, hard skills are becoming mere markdown files. In this era, AI is the force multiplier, but human competency is the core. True strength lies in constant reskilling to navigate the new world.'
    },
  ];

  function buildAccordion() {
    const body = document.getElementById('accordionBody');
    body.innerHTML = '';
    notifications.forEach((n, i) => {
      const item = document.createElement('div');
      item.className = 'accordion-item';

      const contentHtml = n.bullets
        ? n.bullets.map(b => `<div class="accordion-bullet"><span class="accordion-bullet-dot"></span>${b}</div>`).join('')
        : `<p class="accordion-text">${n.body}</p>`;

      item.innerHTML = `
        <button class="accordion-trigger" onclick="toggleAccordion(${i})">
          <span class="accordion-heading">${n.heading}</span>
          <svg class="accordion-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="accordion-body">
          <div class="accordion-content">${contentHtml}</div>
        </div>
      `;
      body.appendChild(item);
    });
  }

  function toggleAccordion(i) {
    const items = document.querySelectorAll('.accordion-item');
    items.forEach((item, idx) => {
      if (idx === i) {
        item.classList.toggle('open');
      } else {
        item.classList.remove('open');
      }
    });
  }

  function openDrawer() {
    document.getElementById('notifDrawer').classList.add('open');
    document.getElementById('notifBackdrop').classList.add('open');
    buildAccordion();
  }

  function closeDrawer() {
    document.getElementById('notifDrawer').classList.remove('open');
    document.getElementById('notifBackdrop').classList.remove('open');
  }
</script>

<!-- Notification Drawer -->
<div class="notif-backdrop" id="notifBackdrop" onclick="closeDrawer()"></div>
<div class="notif-drawer" id="notifDrawer">
  <div class="notif-header">
    <span class="notif-header-title">Tips for you</span>
    <button class="notif-close" onclick="closeDrawer()">×</button>
  </div>
  <div class="notif-body" id="accordionBody"></div>
  <div style="padding:1rem 1.5rem;border-top:1px solid var(--border);flex-shrink:0">
    <span style="font-family:var(--font-mono);font-size:0.55rem;color:var(--border);letter-spacing:0.12em;text-transform:uppercase">Built by Dhaneesh Jameson</span>
  </div>
</div>
</body>
