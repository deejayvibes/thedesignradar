<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Design Radar</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0c10;
      --surface: #13151c;
      --border: #1e2130;
      --accent: #7fffb2;
      --accent2: #4fc3f7;
      --accent3: #ff6b9d;
      --text: #e8eaf2;
      --muted: #555b7a;
      --font-display: 'Syne', sans-serif;
      --font-title: 'Cormorant Garamond', serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow-x: hidden;
      overflow-anchor: none;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 1;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .title {
      font-family: var(--font-title);
      font-weight: 300;
      font-size: 1rem;
      letter-spacing: 0.12em;
      color: var(--text);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .title em {
      font-style: normal;
      color: var(--text);
    }

    .title-sub {
      font-family: var(--font-mono);
      font-size: 0.5rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 400;
      align-self: flex-end;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .notif-bell {
      position: relative;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }

    .notif-bell:hover {
      color: var(--text);
      background: var(--border);
    }

    .notif-dot {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ff6b9d;
      border: 1.5px solid var(--bg);
      box-shadow: 0 0 6px rgba(255, 107, 157, 0.8);
      animation: notif-pulse 2s ease-in-out infinite;
    }

    @keyframes notif-pulse {
      0%, 100% { transform: scale(1);   opacity: 1; }
      50%       { transform: scale(1.3); opacity: 0.7; }
    }

    .btn-download-sm {
      padding: 0.35rem 0.85rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }
    .btn-download-sm:hover { border-color: var(--accent); color: var(--accent); }

    /* ── DOWNLOAD ICON BUTTON ── */
    .btn-download-icon {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      color: var(--muted);
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-download-icon:hover { color: var(--accent); border-color: var(--accent); }
    .dl-tip {
      position: absolute;
      right: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      background: #1e2130;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.06em;
      white-space: nowrap;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .btn-download-icon:hover .dl-tip { opacity: 1; transition-delay: 0.8s; }

    .toggle-tip {
      position: absolute;
      right: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      background: #1e2130;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.06em;
      white-space: nowrap;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .opaque-toggle:hover ~ .toggle-tip,
    div:hover > .toggle-tip { opacity: 1; transition-delay: 0.8s; }

    /* ── NOTIFICATION DRAWER ── */
    .notif-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
    }
    .notif-overlay.open { pointer-events: all; }

    .notif-drawer {
      position: fixed;
      top: 0; right: 0;
      width: 360px;
      height: 100vh;
      background: #0f1117;
      border-left: 1px solid var(--border);
      z-index: 101;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: -12px 0 40px rgba(0,0,0,0.5);
    }
    .notif-drawer.open { transform: translateX(0); }

    @media (max-width: 999px) {
      .notif-drawer { width: min(360px, 85vw); }
    }

    .notif-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      z-index: 100;
      transition: background 0.32s;
      pointer-events: none;
    }
    .notif-backdrop.open {
      background: rgba(0,0,0,0.45);
      pointer-events: all;
    }

    .notif-header {
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .notif-header-title {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .notif-close {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      padding: 0;
      transition: color 0.2s;
    }
    .notif-close:hover { color: var(--text); }

    .notif-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0.5rem 0;
      overflow-y: auto;
    }

    .accordion-item {
      border-bottom: 1px solid var(--border);
    }

    .accordion-trigger {
      width: 100%;
      background: none;
      border: none;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      gap: 1rem;
      transition: background 0.15s;
    }
    .accordion-trigger:hover { background: rgba(255,255,255,0.03); }

    .accordion-heading {
      font-family: var(--font-display);
      font-size: 0.90rem;
      font-weight: 600;
      color: var(--muted);
      text-align: left;
      letter-spacing: 0.01em;
    }

    .accordion-chevron {
      color: var(--muted);
      flex-shrink: 0;
      transition: transform 0.25s ease;
    }
    .accordion-item.open .accordion-chevron { transform: rotate(180deg); }

    .accordion-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s ease;
    }
    .accordion-item.open .accordion-body {
      max-height: 400px;
    }

    .accordion-content {
      padding: 0.25rem 1.5rem 1.25rem;
    }

    .accordion-text {
      font-family: var(--font-display);
      font-size: 0.90rem;
      color: #b0b8d0;
      line-height: 1.7;
      margin: 0;
    }

    .accordion-bullet {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.3rem 0;
      font-family: var(--font-mono);
      font-size: 0.84rem;
      color: #b0b8d0;
      letter-spacing: 0.04em;
    }

    .accordion-bullet-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    /* ── LAYOUT ── */
    main {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 2fr;
      height: 100%;
      overflow: hidden;
      align-items: stretch;
    }

    /* ── LEFT PANEL ── */
    .panel {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1.25rem 1.5rem;
      overflow-y: auto;
      overflow-anchor: none;
      display: flex;
      flex-direction: column;
      gap: 0;
      position: relative;
      align-self: stretch;
      height: 100%;
    }

    .panel-title {
      font-size: 0.6rem;
      font-family: var(--font-mono);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: space-between;
    }
    .panel-title svg { flex-shrink: 0; opacity: 0.75; }
    .panel-title-left { display: flex; align-items: center; gap: 0.5rem; }
    .section-eye-btn {
      background: none; border: none; padding: 4px; cursor: pointer;
      color: inherit; opacity: 0.7; line-height: 1; flex-shrink: 0;
      transition: opacity 0.2s;
      position: relative;
      min-width: 28px; min-height: 28px;
      display: flex; align-items: center; justify-content: center;
    }
    .section-eye-btn:hover { opacity: 1; }
    .section-eye-btn .eye-tip {
      position: absolute;
      right: 0;
      top: calc(100% + 6px);
      background: #1e2130;
      border: 1px solid #2e3250;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.06em;
      white-space: nowrap;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 100;
    }
    .section-eye-btn .eye-tip.visible { opacity: 1; }

    /* Enable to edit callout */
    #deleteBin {
      position: fixed;
      z-index: 9999;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      background: #1e2130;
      border-radius: 50%;
      cursor: pointer;
      color: #ff6b9d;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
    }
    #deleteBin.show { opacity: 1; pointer-events: all; transition: opacity 0.4s ease; }
    #deleteBin svg.bin-icon { position: relative; z-index: 1; }
    #deleteBin .countdown-ring {
      position: absolute;
      top: 0; left: 0;
      width: 40px; height: 40px;
      transform: rotate(-90deg); /* 12 o'clock start */
    }
    #deleteBin .countdown-ring circle {
      fill: none;
      stroke: rgba(255,255,255,0.08);
      stroke-width: 2;
      r: 18; cx: 20; cy: 20;
    }
    #deleteBin .countdown-ring .track {
      stroke: rgba(255,255,255,0.3);
      stroke-dasharray: 113;
      stroke-dashoffset: 0;
      stroke-linecap: round;
      transition: none;
    }
    #deleteBin.show .countdown-ring .track {
      animation: countdown 2s linear forwards;
    }
    @keyframes countdown {
      from { stroke-dashoffset: 0; }
      to   { stroke-dashoffset: 113; }
    }

    #eyeCallout {
      position: fixed;
      z-index: 9999;
      background: #1e2130;
      border: 1px solid #ff6b9d;
      color: #ff6b9d;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      white-space: nowrap;
      padding: 0.35rem 0.75rem;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      top: -9999px;
      left: -9999px;
    }
    #eyeCallout::after {
      content: '';
      position: absolute;
      left: 100%;
      top: 50%;
      transform: translateY(-50%);
      border: 5px solid transparent;
      border-left-color: #ff6b9d;
    }
    #eyeCallout.show { opacity: 1; animation: shake 0.5s ease; }

    /* ── MEMBER TABS ── */
    .member-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      padding-top: 0.75rem;
      padding-bottom: 0.75rem;
      margin-bottom: 0.75rem;
      min-height: 2.2rem;
    }

    /* Desktop tabs: fixed height — sections below never shift */
    #memberTabsDesktop {
      max-height: 8rem;
      overflow: hidden;
    }

    .member-tab {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.6rem 0.3rem 0.5rem;
      border-radius: 100px;
      border: 1.5px solid transparent;
      background: var(--bg);
      cursor: pointer;
      transition: all 0.18s;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      font-family: var(--font-display);
    }
    .member-tab:hover { color: var(--text); border-color: var(--border); }
    .member-tab.active { color: var(--text); background: var(--surface); }

    .member-tab .tab-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    .member-tab .tab-name {
      outline: none; border: none; background: transparent;
      color: inherit; font: inherit; width: 62px; cursor: pointer;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .member-tab.active .tab-name { cursor: text; }

    .member-tab .tab-remove {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 0.75rem; line-height: 1;
      padding: 0; opacity: 0; transition: opacity 0.15s;
      margin-left: 0.4rem;
    }
    .member-tab:hover .tab-remove,
    .member-tab.active .tab-remove { opacity: 1; }

    .add-member-btn {
      padding: 0.3rem 0.7rem;
      border-radius: 100px;
      border: 1.5px solid var(--accent);
      background: var(--accent);
      color: #000;
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.18s;
      line-height: 1;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-weight: 700;
    }
    .add-member-btn:hover { background: #5de89a; border-color: #5de89a; }
    .add-member-btn .plus { color: #000; font-size: 1rem; font-weight: 300; line-height: 1; }

    /* ── METRIC ROWS ── */
    .metric-row {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      padding: 0.5rem 0;
      animation: slideIn 0.4s ease both;
    }

    .metric-row:first-child {
      margin-top: 1.5rem;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .metric-header { display: flex; justify-content: space-between; align-items: center; }
    .metric-label  { display: flex; align-items: center; gap: 0.4rem; font-size: 0.78rem; font-weight: 600; }
    .dot           { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .metric-value  { font-family: var(--font-mono); font-size: 0.72rem; min-width: 20px; text-align: right; }

    /* ── SLIDER ── */
    input[type="range"] {
      width: 100%; -webkit-appearance: none; appearance: none;
      height: 2px; border-radius: 0; background: var(--border);
      outline: none; cursor: pointer; display: block; margin: 6px 0 0 0;
    }
    input[type="range"]::-webkit-slider-runnable-track { height: 2px; background: var(--border); }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--thumb-color, var(--accent));
      box-shadow: 0 0 2px var(--thumb-color, var(--accent));
      transition: background 0.15s, box-shadow 0.15s;
      margin-top: -8px; cursor: grab;
    }
    input[type="range"]:active::-webkit-slider-thumb  { cursor: grabbing; background: #fff; box-shadow: 0 0 4px rgba(255,255,255,0.4); transform: scale(1.2); }
    input[type="range"]::-webkit-slider-thumb:hover   { background: #fff; box-shadow: 0 0 4px rgba(255,255,255,0.4); transform: scale(1.2); }
    input[type="range"]::-moz-range-track { height: 2px; background: var(--border); border: none; }
    input[type="range"]::-moz-range-thumb {
      width: 18px; height: 18px; border-radius: 50%; border: none;
      background: var(--thumb-color, var(--accent));
      box-shadow: 0 0 2px var(--thumb-color, var(--accent)); cursor: grab;
    }

    .panel-footer {
      margin-top: auto;
      padding-top: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-footer-link {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .panel-footer-link:hover { color: var(--text); }

    /* ── TOAST ── */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      15%      { transform: translateX(-8px); }
      30%      { transform: translateX(8px); }
      45%      { transform: translateX(-6px); }
      60%      { transform: translateX(6px); }
      75%      { transform: translateX(-3px); }
      90%      { transform: translateX(3px); }
    }
    .toast {
      position: fixed;
      z-index: 9999;
      background: #1e2130; border: 1px solid #ff6b9d; color: #ff6b9d;
      font-family: var(--font-mono); font-size: 0.65rem;
      padding: 0.4rem 0.85rem; border-radius: 6px; letter-spacing: 0.06em;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; animation: shake 0.5s ease; }

    /* ── RIGHT PANEL ── */
    .chart-area {
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 2rem 3rem 1.5rem; gap: 1rem; position: relative;
      overflow: hidden;
      overflow-y: auto;
      height: 100%;
    }

    .chart-container { position: relative; width: min(520px, 100%); aspect-ratio: 1; }

    .chart-glow {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(127,255,178,0.06) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
    }

    canvas#spiderChart { width: 100% !important; height: 100% !important; }

    /* ── LEGEND ── */
    .chart-legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.5rem 1.25rem; margin-bottom: 24px; }
    .legend-item  { display: flex; align-items: center; gap: 0.4rem; font-family: var(--font-display); font-size: 0.75rem; font-weight: 600; }
    .legend-swatch { width: 20px; height: 3px; border-radius: 2px; flex-shrink: 0; }

    /* ── SPACE LABELS ── */
    .space-label {
      position: absolute;
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.12);
      pointer-events: none;
      z-index: 1;
    }
    .top-left    { top: 1.25rem; left: 1.5rem; }
    .top-right   { top: 1.25rem; right: 1.5rem; }

    /* ── CHART BOTTOM BAR ── */
    .chart-bottom-bar {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      padding: 0 0 0 1.5rem;
      margin-top: auto;
    }

    .chart-bottom-btns {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: nowrap;
    }

    .chart-execution-label {
      position: static;
      display: inline-block;
      text-align: center;
    }

    /* sheet-peek hidden everywhere — no bottom sheet */
    .sheet-peek { display: none; }
    .mobile-only { display: none; }
    .desktop-only { display: flex; flex-direction: column; }

    @media (max-width: 999px) {
      body {
        height: auto;
        overflow: auto;
        overflow-x: hidden;
      }

      main {
        height: auto;
        overflow: visible;
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
      }

      /* Chart first, panel below */
      .chart-area {
        order: 0;
        padding-bottom: 1.5rem;
        padding-right: 1.5rem;
        padding-left: 1.5rem;
      }

      .panel {
        order: 1;
        position: static;
        border-right: none;
        border-top: 1px solid var(--border);
        transform: none;
        box-shadow: none;
        max-height: none;
        overflow-y: visible;
        border-radius: 0;
        padding-bottom: 1.5rem;
      }

      /* Bottom bar back to normal flow on mobile too */
      .chart-bottom-bar {
        position: static !important;
        padding: 0 !important;
        width: 100%;
        margin-left: 0;
        margin-right: 0;
      }

      .chart-bottom-btns {
        width: 100%;
        justify-content: space-between;
        padding-right: 0;
      }

      /* Download icon aligns right edge with Add button (panel has 1.5rem padding) */
      .btn-download-icon {
        margin-right: 0;
        border-radius: 50%;
      }

      header { padding: 1rem 1.25rem; }

      /* Larger touch targets and font for member capsules on mobile */
      .member-tab {
        padding: 0.45rem 0.8rem 0.45rem 0.65rem;
        font-size: 0.85rem;
        min-height: 36px;
      }
      .member-tab .tab-name { font-size: 0.85rem; }
      .add-member-btn {
        padding: 0.45rem 0.9rem;
        font-size: 0.85rem;
        min-height: 36px;
      }
      .add-member-btn .plus { font-size: 1.1rem; }
    }
    .opaque-toggle-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .opaque-toggle-label {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .opaque-toggle {
      position: relative;
      width: 38px;
      height: 18px;
      border-radius: 100px;
      background: var(--border);
      border: none;
      cursor: pointer;
      transition: background 0.2s;
      padding: 0;
      flex-shrink: 0;
    }

    .opaque-toggle.on { background: rgba(127,255,178,0.2); }

    .opaque-toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.2s, background 0.2s;
      pointer-events: none;
    }

    .opaque-toggle.on .opaque-toggle-thumb {
      transform: translateX(20px);
      background: var(--accent);
    }

  </style>
</head>
<body>

<header>
  <div style="display:flex;flex-direction:column;align-items:flex-start;gap:2px">
    <span class="title">Deejay-<em>Graph</em></span>
    <span class="title-sub">The Team Radar</span>
  </div>
  <div class="header-actions">
    <div class="notif-bell" title="Tips" onclick="openDrawer()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="7" x2="21" y2="7"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="17" x2="21" y2="17"/>
      </svg>
    </div>
  </div>
</header>

<main>
  <aside class="panel" id="mainPanel">
    <!-- Desktop: title + member tabs always visible above sliders -->
    <div class="desktop-only" style="display:flex;flex-direction:column;gap:0.5rem;margin-bottom:0.25rem">
      <div style="display:flex;align-items:center;justify-content:space-between;padding-bottom:0.75rem;border-bottom:1px dotted rgba(255,255,255,0.35)">
        <span class="panel-title"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>Team Members</span>
        <span id="addMemberBtnDesktop"></span>
      </div>
      <div class="member-tabs" id="memberTabsDesktop" onclick="event.stopPropagation()"></div>
    </div>
    <!-- Mobile: peek strip with label + member tabs inside -->
    <div class="sheet-peek" id="sheetPeek">
      <div style="display:flex;flex-direction:column;gap:0.5rem;flex:1;min-width:0">
        <span class="sheet-peek-label">Your Team</span>
        <div class="member-tabs mobile-only" id="memberTabs" onclick="event.stopPropagation()"></div>
      </div>
    </div>
    <div class="toast" id="toast"></div>
    <div id="metricsPanel"></div>
  </aside>

  <section class="chart-area">
    <svg id="axisExtLines" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:0"></svg>
    <span class="space-label top-left">Solution Space</span>
    <span class="space-label top-right">Problem Space</span>
    <div class="chart-container">
      <div class="chart-glow"></div>
      <canvas id="spiderChart"></canvas>
    </div>
    <div class="chart-legend" id="chartLegend"></div>

    <!-- Bottom bar: buttons + execution space stacked -->
    <div class="chart-bottom-bar">
      <div class="chart-bottom-btns">
        <div style="display:flex;flex-direction:column;align-items:center;gap:0.3rem;width:38px">
          <button class="opaque-toggle" id="opaqueToggle" onclick="toggleOpaque()" aria-pressed="false">
            <span class="opaque-toggle-thumb"></span>
          </button>
          <span style="font-family:var(--font-mono);font-size:0.625rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);text-align:center;width:100%">Merge</span>
        </div>
        <button class="btn-download-icon" onclick="downloadChart()" id="downloadBtn" style="margin-right:0">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v12M8 11l4 4 4-4"/>
            <line x1="4" y1="20" x2="20" y2="20"/>
          </svg>
          <span class="dl-tip">Download graph</span>
        </button>
      </div>
      <span class="space-label chart-execution-label">Execution Space</span>
    </div>
  </section>
</main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
  const MEMBER_COLOURS = [
    { border: '#7fffb2', bg: 'rgba(127,255,178,0.10)' },
    { border: '#4fc3f7', bg: 'rgba(79,195,247,0.10)'  },
    { border: '#ff6b9d', bg: 'rgba(255,107,157,0.10)' },
    { border: '#ffd166', bg: 'rgba(255,209,102,0.10)' },
    { border: '#a78bfa', bg: 'rgba(167,139,250,0.10)' },
    { border: '#fb923c', bg: 'rgba(251,146,60,0.10)'  },
  ];

  const AXIS_DOTS  = ['#7fffb2','#4fc3f7','#ff6b9d','#ffd166','#a78bfa','#fb923c','#34d399'];
  const axisLabels = ['Hunter','Q1','Q4','Farmer','Q3','Q2'];
  const panelOrder = [0, 3, 1, 5, 4, 2]; // Hunter, Farmer, Q1, Q2, Q3, Q4

  let members      = [{ name: 'Member 1', values: [6, 6, 6, 6, 6, 6], visible: true }];
  let activeMember = 0;

  // ── Chart ──
  const ctx = document.getElementById('spiderChart').getContext('2d');
  const spiderChart = new Chart(ctx, {
    type: 'radar',
    data: { labels: axisLabels, datasets: [] },
    options: {
      responsive: true, maintainAspectRatio: true,
      animation: { duration: 250, easing: 'easeInOutQuart' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#13151c', borderColor: '#1e2130', borderWidth: 1,
          titleFont: { family: 'DM Mono', size: 11 },
          bodyFont:  { family: 'Syne', size: 13, weight: '700' },
          padding: 12,
          callbacks: {
            title: items => members[items[0].datasetIndex]?.name || '',
            label: item  => `  ${axisLabels[item.dataIndex]}: ${item.raw} / 12`
          }
        }
      },
      scales: {
        r: {
          min: 0, max: 12,
          ticks: { stepSize: 2, color: 'transparent', backdropColor: 'transparent', font: { family: 'DM Mono', size: 9 }, showLabelBackdrop: false },
          grid:        { color: '#1e2130', lineWidth: 1 },
          angleLines:  { color: '#1a1d2b', lineWidth: 1 },
          pointLabels: { color: '#8890b0', font: { family: 'Syne', size: 12, weight: '600' } }
        }
      }
    }
  });

  let opaqueMode = false;

  function _toggleVisibility() {
    members[activeMember].visible = !members[activeMember].visible;
    renderTabs(); renderPanel(); updateChart(false); renderLegend();
    // Re-lock height if member became visible (might have grown)
    if (window.innerWidth <= 999) lockPanelHeight();
  }

  function lockPanelHeight() {
    if (window.innerWidth > 999) return;
    // Only lock when all members are visible (full height state)
    if (!members.every(m => m.visible)) return;
    requestAnimationFrame(() => {
      const mp = document.getElementById('metricsPanel');
      if (!mp) return;
      mp.style.minHeight = '';
      requestAnimationFrame(() => {
        mp.style.minHeight = mp.scrollHeight + 'px';
      });
    });
  }

  function toggleMindsets() { _toggleVisibility(); }
  function toggleCore()     { _toggleVisibility(); }

  function toggleOpaque() {
    opaqueMode = !opaqueMode;
    const btn = document.getElementById('opaqueToggle');
    if (btn) { btn.classList.toggle('on', opaqueMode); btn.setAttribute('aria-pressed', opaqueMode); }
    updateChart(false);
    renderLegend();
  }

  function updateChart(animate = true) {
    // Render oldest first, newest last — newest always on top
    const order = members.map((_, i) => i).reverse();

    spiderChart.data.datasets = order.map(i => {
      const mem = members[i];
      const c = MEMBER_COLOURS[i % MEMBER_COLOURS.length];
      // Active member graph hidden when sections are locked off
      // Active member graph hidden when that member is locked off
      const isHidden = !members[i].visible;
      const bg     = isHidden ? 'rgba(0,0,0,0)' : opaqueMode ? 'rgba(30,33,48,0.92)' : c.bg;
      const border = isHidden ? 'rgba(0,0,0,0)' : opaqueMode ? 'rgba(0,0,0,0)' : c.border;
      return {
        label: mem.name, data: mem.values,
        backgroundColor: bg,
        borderColor: border,
        borderWidth: isHidden || opaqueMode ? 0 : 1.5,
        pointBackgroundColor: border,
        pointBorderColor: '#0b0c10',
        pointBorderWidth: isHidden || opaqueMode ? 0 : 2,
        pointRadius: isHidden || opaqueMode ? 0 : 4,
        pointHoverRadius: isHidden || opaqueMode ? 0 : 8,
      };
    });
    spiderChart.options.animation = animate ? { duration: 250, easing: 'easeInOutQuart' } : false;
    spiderChart.update(animate ? undefined : 'none');
    drawExtensionLines();
  }

  // ── Extension lines from max points of Hunter(0), Q4(2), Q3(4) to browser edge ──
  function drawExtensionLines() {
    const svg    = document.getElementById('axisExtLines');
    const canvas = document.getElementById('spiderChart');
    const section = canvas.closest('.chart-area');
    if (!spiderChart.chartArea) return;

    const scale  = spiderChart.scales.r;
    const total  = axisLabels.length;
    const maxR   = scale.drawingArea;
    const cxChart = scale.xCenter;
    const cyChart = scale.yCenter;

    // Canvas position relative to the section
    const canvasRect  = canvas.getBoundingClientRect();
    const sectionRect = section.getBoundingClientRect();
    const dpr         = window.devicePixelRatio || 1;

    // canvas internal coords → section pixel coords
    const scaleX = canvasRect.width  / (canvas.width  / dpr);
    const scaleY = canvasRect.height / (canvas.height / dpr);
    const offX   = canvasRect.left - sectionRect.left;
    const offY   = canvasRect.top  - sectionRect.top;

    function toSection(cx, cy) {
      return {
        x: offX + cx * scaleX,
        y: offY + cy * scaleY
      };
    }

    // Axes to extend: Hunter=0, Q4=2, Q3=4
    const extAxes = [0, 2, 4];

    svg.innerHTML = '';

    extAxes.forEach(axisIdx => {
      const angle  = (2 * Math.PI * axisIdx / total) - Math.PI / 2;
      const dx     = Math.cos(angle);
      const dy     = Math.sin(angle);

      // Max point (value=12) in canvas coords
      const maxPt  = toSection(cxChart + dx * maxR, cyChart + dy * maxR);

      // Extend far enough to always exit the SVG viewport
      const farDist = Math.max(sectionRect.width, sectionRect.height) * 3;
      const endX   = maxPt.x + dx * farDist;
      const endY   = maxPt.y + dy * farDist;

      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', maxPt.x);
      line.setAttribute('y1', maxPt.y);
      line.setAttribute('x2', endX);
      line.setAttribute('y2', endY);
      line.setAttribute('stroke', 'rgba(255,255,255,0.18)');
      line.setAttribute('stroke-width', '1');
      line.setAttribute('stroke-dasharray', '3 7');
      line.setAttribute('stroke-linecap', 'round');
      svg.appendChild(line);
    });
  }

  window.addEventListener('resize', drawExtensionLines);

  // ── Tabs ──
  function renderTabs() {
    ['memberTabs', 'memberTabsDesktop'].forEach(containerId => {
      const tabsEl = document.getElementById(containerId);
      if (!tabsEl) return;
      tabsEl.innerHTML = '';
      members.forEach((mem, i) => {
        const c = MEMBER_COLOURS[i % MEMBER_COLOURS.length];
        const tab = document.createElement('div');
        tab.className = 'member-tab' + (i === activeMember ? ' active' : '');
        tab.style.borderColor = i === activeMember ? c.border : 'transparent';
        if (!members[i].visible) tab.style.opacity = '0.35';
        const dotStyle = members[i].visible
          ? `background:${c.border}`
          : `background:transparent;border:1px solid ${c.border}`;
        const dispName = mem.name.length > 6 ? mem.name.slice(0, 6) + '…' : mem.name;
        tab.innerHTML = `
          <span class="tab-dot" style="${dotStyle}"></span>
          <input class="tab-name" value="${dispName}" readonly maxlength="8"
            onclick="if(!members[${i}].visible){if(${i}!==activeMember){selectMember(${i});}else{showEnableToEdit();}return;}if(${i}===activeMember && members[${i}].visible){this.value=members[${i}].name;this.removeAttribute('readonly');this.select()}else if(${i}!==activeMember){selectMember(${i})}"
            onblur="(function(el){var v=el.value.trim()||'Member ${i+1}';members[${i}].name=v;el.setAttribute('readonly','');renderTabs();updateChart();renderLegend();})(this)"
            onkeydown="if(event.key==='Enter'){this.blur()}"
            title="Click to rename"
          />
          ${members.length > 1 && members[i].visible ? `<button class="tab-remove" onclick="removeMember(${i},event)">×</button>` : ''}
        `;
        tabsEl.appendChild(tab);
      });
      // Add button: in mobile tabs inline; on desktop goes into the heading slot
      if (containerId === 'memberTabsDesktop') {
        const slot = document.getElementById('addMemberBtnDesktop');
        if (slot) {
          slot.innerHTML = '';
          const addBtn = document.createElement('button');
          addBtn.className = 'add-member-btn';
          addBtn.innerHTML = '<span class="plus">+</span><span>Add</span>';
          addBtn.title = 'Add team member';
          addBtn.onclick = addMember;
          slot.appendChild(addBtn);
        }
      } else {
        const addBtn = document.createElement('button');
        addBtn.className = 'add-member-btn';
        addBtn.innerHTML = '<span class="plus">+</span><span>Add</span>';
        addBtn.title = 'Add team member';
        addBtn.onclick = addMember;
        tabsEl.appendChild(addBtn);
      }
    });
  }

  // ── Sliders ──
  function renderPanel() {
    const panel = document.getElementById('metricsPanel');
    const mem   = members[activeMember];
    const c     = MEMBER_COLOURS[activeMember % MEMBER_COLOURS.length];
    panel.innerHTML = '';

    // panelOrder: Hunter(0), Farmer(3), Q1(1), Q2(5), Q3(4), Q4(2)
    // Insert '// Mindsets' before Hunter (index 0 in panelOrder)
    // Insert '// Core Competencies' before Q1 (index 2 in panelOrder)
    const sectionIcons = {
      0: `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z"/></svg>`,
      2: `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>`
    };
    const sectionLabels = { 0: 'Mindsets', 2: 'Core Competencies' };

    panelOrder.forEach((ai, pi) => {
      // Inject section title if needed
      if (sectionLabels[pi] !== undefined) {
        const title = document.createElement('div');
        title.className = 'panel-title';
        title.style.color = c.border;
        title.style.marginTop = pi === 0 ? '1.8rem' : '2.4rem';

        const leftGroup = `<span class="panel-title-left">${sectionIcons[pi]}${sectionLabels[pi]}</span>`;

        const eyeOpen  = `<svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>`;
        const eyeClosed = `<svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>`;

        let eyeBtn = '';
        if (pi === 0) {
          eyeBtn = `<button class="section-eye-btn" id="eyeBtn0" onclick="toggleMindsets()">${members[activeMember].visible ? eyeOpen : eyeClosed}<span class="eye-tip">${members[activeMember].visible ? 'Hide member' : 'Show member'}</span></button>`;
        } else if (pi === 2) {
          eyeBtn = `<button class="section-eye-btn" id="eyeBtn2" onclick="toggleCore()">${members[activeMember].visible ? eyeOpen : eyeClosed}<span class="eye-tip">${members[activeMember].visible ? 'Hide member' : 'Show member'}</span></button>`;
        }

        title.innerHTML = leftGroup + eyeBtn;
        panel.appendChild(title);
        // Divider below each section title
        const hr = document.createElement('div');
        hr.style.cssText = 'width:100%;height:1px;background:none;border-top:1px dotted rgba(255,255,255,0.35);margin:0.75rem 0 0.5rem';
        panel.appendChild(hr);
      }

      const label = axisLabels[ai];
      const val   = mem.values[ai];
      const row   = document.createElement('div');
      row.className = 'metric-row';
      row.style.animationDelay = `${pi * 0.04}s`;
      row.innerHTML = `
        <div class="metric-header">
          <div class="metric-label">
            <span class="dot" style="background:${AXIS_DOTS[ai % AXIS_DOTS.length]}"></span>
            <span style="font-size:0.78rem;font-weight:600">${label}</span>
          </div>
        </div>
        <div style="position:relative;width:100%;margin-top:6px">
          <input type="range" min="0" max="12" step="1" value="${val}"
            id="range-${ai}"
            data-ai="${ai}" style="accent-color:${c.border};--thumb-color:${c.border};width:100%;margin:0"
            onmousedown="
              (function(e){
                var rect=e.target.getBoundingClientRect();
                var trackW=rect.width, thumbR=9;
                var ratio=e.target.value/12;
                var thumbX=rect.left + thumbR + ratio*(trackW - thumbR*2);
                if(Math.abs(e.clientX - thumbX) > thumbR + 4){ e.preventDefault(); }
              })(event)"
            oninput="members[${activeMember}].values[${ai}]=+this.value;updateThumbLabel(${ai},+this.value);updateChart(false)"/>
          <span id="val-${ai}" style="
            position:absolute;
            top:-18px;
            left:calc(${(val/12)*100}% + ${9 - (val/12)*18}px);
            transform:translateX(-50%);
            font-family:'DM Mono',monospace;
            font-size:0.5rem;
            font-weight:500;
            color:${c.border};
            pointer-events:none;
            transition:left 0.05s linear;
            white-space:nowrap;
          ">${val}</span>
        </div>
        <div style="position:relative;width:100%;height:13px;margin-top:1px">
          ${[0,2,4,6,8,10,12].map(n => {
            const pct = (n/12)*100;
            const off = `calc(${pct}% + ${8 - pct*0.16}px)`;
            return `<span id="tick-${ai}-${n}" style="position:absolute;left:${off};transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:0.5rem;color:#555b7a;pointer-events:none;${val===n?'opacity:0':''}">${n}</span>`;
          }).join('')}
        </div>
      `;
      if (!members[activeMember].visible) {
        row.style.display = 'none';
      }
      panel.appendChild(row);
    });

    // Attach passive:false touch listeners so preventDefault works on mobile
    attachSliderTouchGuards();

    // Wire delayed tooltip on eye buttons
    document.querySelectorAll('.section-eye-btn').forEach(btn => {
      let tipTimer = null;
      const tip = btn.querySelector('.eye-tip');
      btn.addEventListener('mouseenter', () => {
        tipTimer = setTimeout(() => tip && tip.classList.add('visible'), 1000);
      });
      btn.addEventListener('mouseleave', () => {
        clearTimeout(tipTimer);
        tip && tip.classList.remove('visible');
      });
    });
  }

  function attachSliderTouchGuards() {
    document.querySelectorAll('input[type="range"][data-ai]').forEach(slider => {
      // Remove any previous listener by cloning (avoids duplicates)
      const fresh = slider.cloneNode(true);
      // Re-attach the oninput since cloneNode drops it
      const ai = parseInt(fresh.getAttribute('data-ai'));
      fresh.addEventListener('input', () => {
        members[activeMember].values[ai] = +fresh.value;
        updateThumbLabel(ai, +fresh.value);
        updateChart(false);
      });
      fresh.addEventListener('touchstart', e => {
        const rect   = fresh.getBoundingClientRect();
        const trackW = rect.width;
        const thumbR = 9;
        const ratio  = fresh.value / 12;
        const thumbX = rect.left + thumbR + ratio * (trackW - thumbR * 2);
        const tx     = e.touches[0].clientX;
        if (Math.abs(tx - thumbX) > thumbR + 6) {
          e.preventDefault();
          e.stopPropagation();
        }
      }, { passive: false });
      slider.parentNode.replaceChild(fresh, slider);
    });
  }

  function updateThumbLabel(ai, val) {
    const label = document.getElementById(`val-${ai}`);
    if (!label) return;
    const pct = val / 12;
    const offset = 9 - pct * 18;
    label.style.left = `calc(${pct * 100}% + ${offset}px)`;
    label.textContent = val;
    // Show/hide scale ticks — hide only the one matching current value
    [0,2,4,6,8,10,12].forEach(n => {
      const tick = document.getElementById(`tick-${ai}-${n}`);
      if (tick) tick.style.opacity = (n === val) ? '0' : '1';
    });
  }

  // ── Legend ──
  function renderLegend() {
    document.getElementById('chartLegend').innerHTML = members.map((mem, i) => {
      if (!mem.visible) return '';
      const c = MEMBER_COLOURS[i % MEMBER_COLOURS.length];
      const nameColour = opaqueMode ? 'var(--muted)' : c.border;
      const displayName = mem.name.length > 6 ? mem.name.slice(0, 6) + '...' : mem.name;
      return `<div class="legend-item" data-member="${i}" onmouseenter="flashMemberOutline(${i})" style="cursor:default">
        <span style="color:${nameColour}">${displayName}</span>
      </div>`;
    }).join('');
  }

  // ── Member outline flash on legend hover ──
  let _outlineFlash = {}; // { memberIdx: { alpha, raf } }

  const outlineFlashPlugin = {
    id: 'outlineFlash',
    afterDatasetsDraw(chart) {
      const keys = Object.keys(_outlineFlash);
      if (!keys.length) return;
      const scale = chart.scales.r;
      const ctx2  = chart.ctx;
      const total = axisLabels.length;
      const angle = i => (2 * Math.PI * i / total) - Math.PI / 2;

      keys.forEach(key => {
        const mi     = parseInt(key);
        const alpha  = _outlineFlash[mi];
        if (!alpha || alpha <= 0) return;
        const mem    = members[mi];
        if (!mem || !mem.visible) return;
        const c      = MEMBER_COLOURS[mi % MEMBER_COLOURS.length];

        ctx2.save();
        ctx2.beginPath();
        mem.values.forEach((val, axisIdx) => {
          const r = scale.getDistanceFromCenterForValue(val);
          const a = angle(axisIdx);
          const x = scale.xCenter + Math.cos(a) * r;
          const y = scale.yCenter + Math.sin(a) * r;
          if (axisIdx === 0) ctx2.moveTo(x, y);
          else ctx2.lineTo(x, y);
        });
        ctx2.closePath();
        ctx2.strokeStyle = c.border.replace(')', `,${alpha})`).replace('rgb', 'rgba');
        // If already rgba, just update alpha
        ctx2.strokeStyle = `${c.border}`;
        ctx2.globalAlpha = alpha;
        ctx2.lineWidth   = 1;
        ctx2.shadowColor = c.border;
        ctx2.shadowBlur  = 10 * alpha;
        ctx2.stroke();
        ctx2.restore();
      });
    }
  };
  Chart.register(outlineFlashPlugin);

  function flashMemberOutline(mi) {
    if (_outlineFlash[mi] && _outlineFlash[mi]._raf) cancelAnimationFrame(_outlineFlash[mi]._raf);
    const startTime  = performance.now();
    const duration   = 700;

    function tick(now) {
      const t = Math.min(1, (now - startTime) / duration);
      _outlineFlash[mi] = t < 0.15 ? t / 0.15 : 1 - ((t - 0.15) / 0.85);
      _outlineFlash[mi]._raf = undefined;
      spiderChart.update('none');
      if (t < 1) {
        _outlineFlash[mi]._raf = requestAnimationFrame(tick);
      } else {
        delete _outlineFlash[mi];
        spiderChart.update('none');
      }
    }
    _outlineFlash[mi] = 0;
    _outlineFlash[mi]._raf = requestAnimationFrame(tick);
  }

  let _eyeCalloutTimer = null;
  function showEnableToEdit() {
    // Double rAF — first frame triggers after render, second after layout/paint
    requestAnimationFrame(() => requestAnimationFrame(() => {
      const callout = document.getElementById('eyeCallout');
      const eyeBtn  = document.getElementById('eyeBtn0') || document.getElementById('eyeBtn2');
      if (!callout || !eyeBtn) return;

      callout.classList.add('show');

  function selectMember(i) {
    activeMember = i;
    renderTabs(); renderPanel(); updateChart(); renderLegend();
    positionAfterPaint();
  }

  // ── Toast ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;

    // Position above the Add button (desktop slot or mobile tab container)
    const addSlot = document.getElementById('addMemberBtnDesktop');
    const mobileAdd = document.querySelector('#memberTabs .add-member-btn');
    const anchor = (addSlot && addSlot.getBoundingClientRect().width > 0) ? addSlot : mobileAdd;

    if (anchor) {
      const rect  = anchor.getBoundingClientRect();
      const toastW = 180;
      const left   = rect.left - toastW - 8;

      t.style.top       = top + 'px';
      t.style.transform = '';
    } else {
      t.style.left      = '50%';
      t.style.transform = 'translateX(-50%)';
      t.style.top       = '5rem';
    }

    t.classList.remove('show');
    void t.offsetWidth;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  function addMember() {
    if (members.length >= 6) { showToast('Maximum limit reached'); return; }
    members.push({ name: `Member ${members.length + 1}`, values: [6,6,6,6,6,6], visible: true });
    selectMember(members.length - 1);
  }

  let _deleteBinTimer = null;
  let _deletePendingIdx = null;

  function removeMember(i, e) {
    e.stopPropagation();
    if (members.length <= 1) return;
    if (!members[i].visible) return;
    if (window.innerWidth <= 999 && i !== activeMember) return;

    const isPerfect = members[i].values.every(v => v === 6);

    if (isPerfect) {
      // Instant delete — perfect hexagon
      _doDelete(i);
    } else {
      // Show bin confirmation above the × button
      const btn = e.currentTarget;
      const rect = btn.getBoundingClientRect();
      const bin  = document.getElementById('deleteBin');
      _deletePendingIdx = i;

      bin.style.left = (rect.left + rect.width / 2 - 20) + 'px';
      bin.style.top  = (rect.top - 64 - 20) + 'px'; // 64px above capsule centre
      bin.classList.remove('show');
      void bin.offsetWidth; // reflow to restart animation
      bin.classList.add('show');

      clearTimeout(_deleteBinTimer);
      _deleteBinTimer = setTimeout(() => {
        bin.classList.remove('show');
        _deletePendingIdx = null;
      }, 2000);
    }
  }

  function confirmDelete() {
    if (_deletePendingIdx === null) return;
    const i = _deletePendingIdx;
    _deletePendingIdx = null;
    clearTimeout(_deleteBinTimer);
    document.getElementById('deleteBin').classList.remove('show');
    _doDelete(i);
  }

  function _doDelete(i) {
    members.splice(i, 1);
    activeMember = Math.min(activeMember, members.length - 1);
    renderTabs(); renderPanel(); updateChart(); renderLegend();
  }

  // ── Drag on chart — node-only, axis-projected, integer steps ──
  (function setupChartDrag() {
    const canvas = document.getElementById('spiderChart');
    let draggingIdx = null;

    function center() {
      const a = spiderChart.chartArea;
      return { x:(a.left+a.right)/2, y:(a.top+a.bottom)/2, r:Math.min(a.right-a.left,a.bottom-a.top)/2 };
    }
    function angle(i, total) { return (2*Math.PI*i/total) - Math.PI/2; }

    // Get position in Chart.js internal coordinates (accounts for DPR)
    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const src  = e.touches ? e.touches[0] : e;
      const dpr  = window.devicePixelRatio || 1;
      return {
        x: (src.clientX - rect.left) / rect.width  * (canvas.width  / dpr),
        y: (src.clientY - rect.top)  / rect.height * (canvas.height / dpr)
      };
    }

    // Update cursor based on proximity to any node
    function updateCursor(e) {
      if (draggingIdx !== null) return;
      const {x, y} = getPos(e);
      const idx = findNode(x, y, 40);
      canvas.style.cursor = idx !== -1 ? 'grab' : '';
    }

    function findNode(px, py, hitR) {
      const {x:cx, y:cy, r:cr} = center();
      const n = axisLabels.length;
      let best = -1, bestD = hitR;
      members[activeMember].values.forEach((v, i) => {
        const a = angle(i, n), ratio = v / 12;
        const nx = cx + Math.cos(a) * cr * ratio;
        const ny = cy + Math.sin(a) * cr * ratio;
        const d  = Math.hypot(px - nx, py - ny);
        if (d < bestD) { bestD = d; best = i; }
      });
      return best;
    }

    function projectToAxis(px, py, idx) {
      const {x:cx, y:cy, r:cr} = center();
      const a  = angle(idx, axisLabels.length);
      const dx = Math.cos(a), dy = Math.sin(a);
      const dot = (px - cx) * dx + (py - cy) * dy;
      return Math.round(Math.max(0, Math.min(12, (dot / cr) * 12)));
    }

    function syncSlider(ai, val) {
      const sl = document.querySelector(`input[data-ai="${ai}"]`);
      if (sl) sl.value = val;
      updateThumbLabel(ai, val);
    }

    function onDown(e) {
      if (!members[activeMember].visible) return;
      const {x, y} = getPos(e);
      const idx = findNode(x, y, 40);
      if (idx === -1) return;
      e.preventDefault();
      draggingIdx = idx;
      canvas.style.cursor = 'grabbing';
    }

    function onMove(e) {
      updateCursor(e);
      if (draggingIdx === null || draggingIdx === -1) return;
      e.preventDefault();
      const {x, y} = getPos(e);
      const val = projectToAxis(x, y, draggingIdx);
      if (val !== members[activeMember].values[draggingIdx]) {
        members[activeMember].values[draggingIdx] = val;
        syncSlider(draggingIdx, val);
        updateChart(false);
      }
    }

    function onUp() {
      draggingIdx = null;
      canvas.style.cursor = '';
    }

    canvas.addEventListener('mousedown',  onDown);
    canvas.addEventListener('mousemove',  onMove);
    canvas.addEventListener('mouseup',    onUp);
    canvas.addEventListener('mouseleave', onUp);
    canvas.addEventListener('touchstart', onDown, {passive: false});
    canvas.addEventListener('touchmove',  onMove, {passive: false});
    canvas.addEventListener('touchend',   onUp);
  })();

  // ── Download PNG ──
  function downloadChart() {
    const PAD=48, chartCanvas=document.getElementById('spiderChart'), dpr=window.devicePixelRatio||1;
    const chartW=chartCanvas.width/dpr, chartH=chartCanvas.height/dpr;

    // Only include visible members, matching screen behaviour
    const visibleMembers = members.map((mem,i) => ({...mem, i})).filter(m => m.visible);
    const showLegend = visibleMembers.length > 0;

    // In team view (opaqueMode): names only in muted colour, no swatch
    // In normal view: coloured name, no swatch (matches screen which has no swatch line)
    const legendItems = visibleMembers.map(m => ({
      name: m.name.length > 6 ? m.name.slice(0,6) + '...' : m.name,
      color: opaqueMode ? '#555b7a' : MEMBER_COLOURS[m.i % MEMBER_COLOURS.length].border,
      showSwatch: false,
    }));

    const swatchW=0, swatchH=3, gap=0, itemGap=24, fontSize=13;
    const tmp=document.createElement('canvas').getContext('2d');
    tmp.font=`600 ${fontSize}px Syne, sans-serif`;
    const itemWidths=legendItems.map(it=>tmp.measureText(it.name).width);
    const totalLegendW=legendItems.length ? itemWidths.reduce((a,b)=>a+b,0)+(legendItems.length-1)*itemGap : 0;
    const legendH = showLegend ? 24+16 : 0;
    const totalW=chartW+PAD*2;
    const watermarkH = Math.max(40, Math.round(totalW * 0.05));
    const totalH=chartH+PAD*2+legendH+watermarkH;
    const off=document.createElement('canvas');
    off.width=totalW*dpr; off.height=totalH*dpr;
    const octx=off.getContext('2d');
    octx.scale(dpr,dpr);
    octx.fillStyle='#0b0c10'; octx.fillRect(0,0,totalW,totalH);
    octx.drawImage(chartCanvas,PAD,PAD,chartW,chartH);

    if (showLegend) {
      const legendY=PAD+chartH+16; let legendX=(totalW-totalLegendW)/2;
      legendItems.forEach((it,i)=>{
        octx.fillStyle=it.color;
        octx.font=`600 ${fontSize}px Syne, sans-serif`; octx.textBaseline='middle';
        octx.fillText(it.name, legendX, legendY+fontSize/2);
        legendX+=itemWidths[i]+itemGap;
      });
    }

    // Watermark — auto-fit font size so text never gets clipped
    const wmText = `The Deejay-Graph © 2020–${new Date().getFullYear()} by Dhaneesh Jameson is licensed under CC BY-NC 4.0`;
    let wmFontSize = Math.max(10, Math.round(totalW * 0.018));
    octx.textBaseline = 'middle';
    octx.textAlign = 'center';
    // Shrink font until text fits within canvas with 16px padding each side
    octx.font = `400 ${wmFontSize}px monospace`;
    while (octx.measureText(wmText).width > totalW - 32 && wmFontSize > 8) {
      wmFontSize--;
      octx.font = `400 ${wmFontSize}px monospace`;
    }
    const wmY = totalH - watermarkH / 2;
    octx.fillStyle = 'rgba(255,255,255,0.35)';
    octx.fillText(wmText, totalW / 2, wmY);

    // On mobile with Web Share API support — share the image
    if (navigator.share && window.innerWidth < 1000) {
      off.toBlob(async blob => {
        try {
          const file = new File([blob], 'The_Deejay-Graph.png', { type: 'image/png' });
          await navigator.share({ files: [file], title: 'The Deejay-Graph' });
        } catch (err) {
          // User cancelled or share failed — fall back to download
          const link = document.createElement('a');
          link.download = 'The_Deejay-Graph.png';
          link.href = URL.createObjectURL(blob);
          document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }
      }, 'image/png');
    } else {
      const link=document.createElement('a');
      link.download='The_Deejay-Graph.png'; link.href=off.toDataURL('image/png');
      document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }
  }

  // ── Layout helpers (no-op — bottom sheet removed) ──
  function updatePeekHeight() {}
  function toggleSheet() {}
  function positionAbovePanel() {
    const b = document.querySelector('.chart-bottom-bar');
    if (b) { b.style.position=''; b.style.bottom=''; b.style.left=''; b.style.right=''; b.style.zIndex=''; b.style.padding=''; }
  }
  function positionAfterPaint() {}
  window.addEventListener('resize', positionAbovePanel);

  // ── Hunter + Farmer axis unit labels — both on same vertical axis ──
  Chart.register({
    id: 'farmerAxisLabels',
    afterDraw(chart) {
      const scale = chart.scales.r;
      const cx = scale.xCenter, cy = scale.yCenter;
      const ctx2 = chart.ctx;
      const total = axisLabels.length;

      ctx2.save();
      ctx2.font = '9px DM Mono, monospace';
      ctx2.fillStyle = '#2e3450';
      ctx2.textAlign = 'center';
      ctx2.textBaseline = 'middle';

      // Hunter = index 0 (straight up), Farmer = index 3 (straight down)
      // Both share x = cx (same vertical axis)
      [2, 4, 6, 8, 10, 12].forEach(val => {
        const r = scale.getDistanceFromCenterForValue(val);
        // Hunter: above centre
        ctx2.fillText(String(val), cx, cy - r);
        // Farmer: below centre
        ctx2.fillText(String(val), cx, cy + r);
      });

      ctx2.restore();
    }
  });

  // ── Space label hover flash effects ──
  // Axes: Hunter=0, Q1=1, Q4=2, Farmer=3, Q3=4, Q2=5
  let solutionFlash = 0, problemFlash = 0, executionFlash = 0;

  function makeFlashPlugin(id, getLine, flashRef) {
    return {
      id,
      afterDraw(chart) {
        const f = flashRef();
        if (f <= 0) return;
        const scale = chart.scales.r;
        const cx = scale.xCenter, cy = scale.yCenter;
        const cr = scale.getDistanceFromCenterForValue(12);
        const total = axisLabels.length;
        const angle = i => (2 * Math.PI * i / total) - Math.PI / 2;
        const [a, b] = getLine();
        const pA = { x: cx + Math.cos(angle(a)) * cr, y: cy + Math.sin(angle(a)) * cr };
        const pB = { x: cx + Math.cos(angle(b)) * cr, y: cy + Math.sin(angle(b)) * cr };
        const ctx2 = chart.ctx;
        ctx2.save();
        ctx2.beginPath();
        ctx2.moveTo(pA.x, pA.y); ctx2.lineTo(cx, cy); ctx2.lineTo(pB.x, pB.y);
        ctx2.strokeStyle = `rgba(127,255,178,${f * 0.9})`;
        ctx2.lineWidth = 1; ctx2.lineCap = 'round';
        ctx2.shadowColor = `rgba(127,255,178,${f * 0.6})`; ctx2.shadowBlur = 4 * f;
        ctx2.stroke(); ctx2.restore();
      }
    };
  }

  function runFlash(rafRef, setFlash) {
    cancelAnimationFrame(rafRef.v);
    const t0 = performance.now();
    function tick(now) {
      const t = Math.min(1, (now - t0) / 900);
      setFlash(t < 0.1 ? t / 0.1 : 1 - ((t - 0.1) / 0.9));
      spiderChart.update('none');
      if (t < 1) rafRef.v = requestAnimationFrame(tick);
      else { setFlash(0); spiderChart.update('none'); }
    }
    rafRef.v = requestAnimationFrame(tick);
  }

  const _sRaf = {v:null}, _pRaf = {v:null}, _eRaf = {v:null};
  Chart.register(makeFlashPlugin('solutionFlash',  () => [4, 0], () => solutionFlash));
  Chart.register(makeFlashPlugin('problemFlash',   () => [2, 0], () => problemFlash));
  Chart.register(makeFlashPlugin('executionFlash', () => [2, 4], () => executionFlash));

  function triggerSpaceFlash(sel, rafRef, setFlash) {
    runFlash(rafRef, setFlash);
    flashLabel(sel);
  }

  document.querySelector('.top-left').addEventListener('mouseenter',
    () => triggerSpaceFlash('.top-left', _sRaf, v => solutionFlash = v));
  document.querySelector('.top-left').addEventListener('click',
    () => triggerSpaceFlash('.top-left', _sRaf, v => solutionFlash = v));

  document.querySelector('.top-right').addEventListener('mouseenter',
    () => triggerSpaceFlash('.top-right', _pRaf, v => problemFlash = v));
  document.querySelector('.top-right').addEventListener('click',
    () => triggerSpaceFlash('.top-right', _pRaf, v => problemFlash = v));

  document.querySelector('.chart-execution-label').addEventListener('mouseenter',
    () => triggerSpaceFlash('.chart-execution-label', _eRaf, v => executionFlash = v));
  document.querySelector('.chart-execution-label').addEventListener('click',
    () => triggerSpaceFlash('.chart-execution-label', _eRaf, v => executionFlash = v));

  function flashLabel(sel) {
    const el = document.querySelector(sel);
    if (!el) return;
    el.style.transition = 'color 0.05s ease, text-shadow 0s';
    el.style.color = 'rgba(127,255,178,0.9)';
    el.style.textShadow = '0 0 8px rgba(127,255,178,0.6)';
    setTimeout(() => {
      el.style.transition = 'color 0.8s ease, text-shadow 0.8s ease';
      el.style.color = '';
      el.style.textShadow = '';
    }, 150);
  }
  ['.top-left', '.top-right', '.chart-execution-label'].forEach(sel => {
    const el = document.querySelector(sel);
    if (el) { el.style.pointerEvents = 'all'; el.style.cursor = 'pointer'; }
  });

  renderTabs(); renderPanel(); updateChart(); renderLegend();
  setTimeout(drawExtensionLines, 300);
  positionAfterPaint();
  lockPanelHeight();
  const notifications = [
    {
      heading: 'About',
      body: 'The Deejay-Graph helps you map a product team\'s collective strengths across four core competencies and two distinct mindsets, based on a framework developed by Dhaneesh Jameson. The members need not be limited to designers.'
    },
    {
      heading: 'How to plot the graph',
      body: 'Don\'t look for the \'perfect hexagon\' in an individual. Map your teammates\' peaks and valleys to build a squad where strengths cover gaps, the same way you\'d scout a sports team. <a href="https://medium.com/awful-awkward-awesome-the-in-betweens/a-framework-to-put-together-a-mighty-design-team-for-product-and-service-based-organisations-df2cbcf5ff0c" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none">Read more</a>.'
    },
    {
      heading: 'Units & logic',
      bullets: ['Level 1 (Emerging) — Up to 4', 'Level 2 (Established) — Up to 8', 'Level 3 (Distinguished) — Up to 12']
    },
    {
      heading: 'Renaming tags',
      body: 'Select the label of any "Member" tag to rename it.'
    },
    {
      heading: 'Relevance in the AI era',
      body: 'Yes! more than ever!<br>With AI commoditising execution, a designer\'s value is increasingly defined by their foundational competencies.'
    },
  ];

  function buildAccordion() {
    const body = document.getElementById('accordionBody');
    body.innerHTML = '';
    notifications.forEach((n, i) => {
      const item = document.createElement('div');
      item.className = 'accordion-item';

      const contentHtml = n.bullets
        ? n.bullets.map(b => `<div class="accordion-bullet"><span class="accordion-bullet-dot"></span>${b}</div>`).join('')
        : `<p class="accordion-text">${n.body}</p>`;

      item.innerHTML = `
        <button class="accordion-trigger" onclick="toggleAccordion(${i})">
          <span class="accordion-heading">${n.heading}</span>
          <svg class="accordion-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="accordion-body">
          <div class="accordion-content">${contentHtml}</div>
        </div>
      `;
      body.appendChild(item);
    });
  }

  function toggleAccordion(i) {
    const items = document.querySelectorAll('.accordion-item');
    items.forEach((item, idx) => {
      if (idx === i) {
        item.classList.toggle('open');
      } else {
        item.classList.remove('open');
      }
    });
  }

  function openDrawer() {
    document.getElementById('notifDrawer').classList.add('open');
    document.getElementById('notifBackdrop').classList.add('open');
    document.body.style.overflow = 'hidden';
    buildAccordion();
  }

  function closeDrawer() {
    document.getElementById('notifDrawer').classList.remove('open');
    document.getElementById('notifBackdrop').classList.remove('open');
    document.body.style.overflow = '';
  }
</script>
